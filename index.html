<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Card Profissional - Meta Alemanha</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* 1. DEFINIÇÃO DA ANIMAÇÃO DE ENTRADA */
    @keyframes sutilAparecer {
        from {
            opacity: 0;
            transform: translateY(30px); /* Começa 30px abaixo */
        }
        to {
            opacity: 1;
            transform: translateY(0); /* Sobe para a posição real */
        }
    }

    :root {
        --cor-fundo: #c9c9c9;
        --cor-texto: #333333;
        --cor-caixa: #ffffff;
        --cor-destaque: #007bff;
    }

    body.dark-mode {
        --cor-fundo: #121212;
        --cor-texto: #e0e0e0;
        --cor-caixa: #1e1e1e;
        --cor-destaque: #bb86fc;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--cor-fundo);
        color: var(--cor-texto);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px; /* Evita que o card encoste na borda do celular */
        transition: background-color 0.5s;
    }

   .card {
    /* ... seus estilos anteriores ... */
    position: relative;
    overflow: hidden;
}

/* O brilho que passa pelo card ao carregar */
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        to right, 
        transparent, 
        rgba(255, 255, 255, 0.4), 
        transparent
    );
    transform: skewX(-25deg);
    transition: 0.5s;
}

.card:hover::before {
    animation: brilhoPassando 0.8s;
}

@keyframes brilhoPassando {
    100% { left: 150%; }
}
    

    /* RESPONSIVIDADE (MEDIA QUERY) */
    @media (max-width: 480px) {
        .card {
            max-width: 90%; /* Deixa uma margem maior em celulares muito pequenos */
        }
        
        h2 {
            font-size: 18px; /* Diminui um pouco o título no celular */
        }
    }
    /* 1. Primeiro definimos as "regras do jogo" (Variáveis) */
    :root {
        --cor-fundo: #c9c9c9;
        --cor-texto: #333333;
        --cor-caixa: #ffffff;
        --cor-destaque: #007bff;
    }

    /* 2. Quando o botão liga o Dark Mode, as cores mudam aqui */
    body.dark-mode {
        --cor-fundo: #121212;
        --cor-texto: #e0e0e0;
        --cor-caixa: #1e1e1e;
        --cor-destaque: #bb86fc;
    }

    /* 3. Agora aplicamos as variáveis nos elementos */
   body {
    /* Um gradiente suave para o efeito de vidro aparecer melhor */
    background: linear-gradient(135deg, var(--cor-fundo) 0%, #adb5bd 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.5s;
}

.card {
    /* A MÁGICA DO VIDRO */
    background: rgba(255, 255, 255, 0.7); /* Branco semi-transparente */
    backdrop-filter: blur(15px); /* O desfoque do vidro */
    -webkit-backdrop-filter: blur(15px); /* Compatibilidade para Safari/iPhone */
    
    border: 1px solid rgba(255, 255, 255, 0.3); /* Borda fina de "brilho" */
    width: 90%;
    max-width: 350px;
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    animation: sutilAparecer 1s ease-out;
}

/* Ajuste do card no Modo Dark para parecer vidro fumê */
body.dark-mode .card {
    background: rgba(30, 30, 30, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

    .card:hover {
        transform: translateY(-5px);
    }

    .card-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .card-content {
        padding: 25px;
        text-align: center;
    }

    /* O botão e o H1 também usam a cor de destaque */
  h1 {
    /* Use a variável de destaque que muda no modo dark */
    color: var(--cor-destaque) !important; 
    transition: 0.5s; /* Para a cor mudar suavemente junto com o fundo */
}
    

    .meu-botao {
        background-color: var(--cor-destaque);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
        width: 100%;
        transition: 0.3s;
        font-family: 'Inter', sans-serif;
    }

    .meu-botao:hover {
        filter: brightness(1.2); /* Deixa a cor um pouco mais clara no hover */
        transform: scale(1.02);
    }
    .botao-tema {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: var(--cor-caixa);
    color: var(--cor-texto);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 1000; /* Garante que ele fique acima de tudo */
}

/* Efeito de Hover (Designer Touch) */
.botao-tema:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* Lógica de ícones: Esconde o sol no modo claro, esconde a lua no modo dark */
.botao-tema .fa-sun { display: none; }

body.dark-mode .botao-tema .fa-sun { display: block; color: #f1c40f; }
body.dark-mode .botao-tema .fa-moon { display: none; }
.btn-contato {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25d366;
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
    z-index: 1000;
    animation: pulsar 2s infinite;
}

.btn-contato:hover {
    transform: scale(1.1);
    background-color: #128c7e;
}

@keyframes pulsar {
    0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}
</style>

  <script>
    // 1. Ao carregar a página, verifica se já existe uma preferência salva
    const temaSalvo = localStorage.getItem('tema');

    if (temaSalvo === 'dark') {
        document.body.classList.add('dark-mode');
    }

    function toggleDarkMode() {
        // 2. Alterna a classe no body
        document.body.classList.toggle('dark-mode');

        // 3. Salva a escolha do usuário na "gaveta" (localStorage)
        if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('tema', 'dark');
        } else {
            localStorage.setItem('tema', 'light');
        }
        
        console.log("Preferência de tema atualizada!");
    }

let tituloOriginal = document.title;

window.onblur = () => {

};

window.onfocus = () => {
    document.title = tituloOriginal;
};
</script>
