<head> 
    <meta charset="UTF-8">

    <title>Meu Card Profissional - Meta Alemanha</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* 1. DEFINIÇÃO DA ANIMAÇÃO DE ENTRADA */
    @keyframes sutilAparecer {
        from {
            opacity: 0;
            transform: translateY(30px); /* Começa 30px abaixo */
        }
        to {
            opacity: 1;
            transform: translateY(0); /* Sobe para a posição real */
        }
    }

    :root {
        --cor-fundo: #c9c9c9;
        --cor-texto: #333333;
        --cor-caixa: #ffffff;
        --cor-destaque: #007bff;
    }

    body.dark-mode {
        --cor-fundo: #121212;
        --cor-texto: #e0e0e0;
        --cor-caixa: #1e1e1e;
        --cor-destaque: #bb86fc;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--cor-fundo);
        color: var(--cor-texto);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px; /* Evita que o card encoste na borda do celular */
        transition: background-color 0.5s;
    }

   .card {
    /* ... seus estilos anteriores ... */
    position: relative;
    overflow: hidden;
}

/* O brilho que passa pelo card ao carregar */
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        to right, 
        transparent, 
        rgba(255, 255, 255, 0.4), 
        transparent
    );
    transform: skewX(-25deg);
    transition: 0.5s;
}

.card:hover::before {
    animation: brilhoPassando 0.8s;
}

@keyframes brilhoPassando {
    100% { left: 150%; }
}
    

    /* RESPONSIVIDADE (MEDIA QUERY) */
    @media (max-width: 480px) {
        .card {
            max-width: 90%; /* Deixa uma margem maior em celulares muito pequenos */
        }
        
        h2 {
            font-size: 18px; /* Diminui um pouco o título no celular */
        }
    }
    /* 1. Primeiro definimos as "regras do jogo" (Variáveis) */
    :root {
        --cor-fundo: #c9c9c9;
        --cor-texto: #333333;
        --cor-caixa: #ffffff;
        --cor-destaque: #007bff;
    }

    /* 2. Quando o botão liga o Dark Mode, as cores mudam aqui */
    body.dark-mode {
        --cor-fundo: #121212;
        --cor-texto: #e0e0e0;
        --cor-caixa: #1e1e1e;
        --cor-destaque: #bb86fc;
    }

    /* 3. Agora aplicamos as variáveis nos elementos */
   body {
    /* Um gradiente suave para o efeito de vidro aparecer melhor */
    background: linear-gradient(135deg, var(--cor-fundo) 0%, #adb5bd 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.5s;
}

.card {
    /* A MÁGICA DO VIDRO */
    background: rgba(255, 255, 255, 0.7); /* Branco semi-transparente */
    backdrop-filter: blur(15px); /* O desfoque do vidro */
    -webkit-backdrop-filter: blur(15px); /* Compatibilidade para Safari/iPhone */
    
    border: 1px solid rgba(255, 255, 255, 0.3); /* Borda fina de "brilho" */
    width: 90%;
    max-width: 350px;
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    animation: sutilAparecer 1s ease-out;
}

/* Ajuste do card no Modo Dark para parecer vidro fumê */
body.dark-mode .card {
    background: rgba(30, 30, 30, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

    .card:hover {
        transform: translateY(-5px);
    }

    .card-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .card-content {
        padding: 25px;
        text-align: center;
    }

    /* O botão e o H1 também usam a cor de destaque */
  h1 {
    /* Use a variável de destaque que muda no modo dark */
    color: var(--cor-destaque) !important; 
    transition: 0.5s; /* Para a cor mudar suavemente junto com o fundo */
}
    

    .meu-botao {
        background-color: var(--cor-destaque);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
        width: 100%;
        transition: 0.3s;
        font-family: 'Inter', sans-serif;
    }

    .meu-botao:hover {
        filter: brightness(1.2); /* Deixa a cor um pouco mais clara no hover */
        transform: scale(1.02);
    }
    .botao-tema {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: var(--cor-caixa);
    color: var(--cor-texto);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 1000; /* Garante que ele fique acima de tudo */
}

/* Efeito de Hover (Designer Touch) */
.botao-tema:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* Lógica de ícones: Esconde o sol no modo claro, esconde a lua no modo dark */
.botao-tema .fa-sun { display: none; }

body.dark-mode .botao-tema .fa-sun { display: block; color: #f1c40f; }
body.dark-mode .botao-tema .fa-moon { display: none; }
.btn-contato {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25d366;
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
    z-index: 1000;
    animation: pulsar 2s infinite;
}

.btn-contato:hover {
    transform: scale(1.1);
    background-color: #128c7e;
}

@keyframes pulsar {
    0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}
/* ESTILO DAS SKILLS */
.skills-container {
    text-align: left;
    margin-top: 20px;
    padding: 0 10px;
}

.skill-item {
    margin-bottom: 15px;
}

.skill-info {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 5px;
    font-weight: 600;
}

.skill-bar-bg {
    background: rgba(0, 0, 0, 0.1);
    height: 8px;
    border-radius: 10px;
    overflow: hidden;
}

body.dark-mode .skill-bar-bg {
    background: rgba(255, 255, 255, 0.1);
}

.skill-bar-fill {
    background: var(--cor-destaque);
    height: 100%;
    width: 0; /* Começa em 0 para a animação funcionar */
    border-radius: 10px;
    transition: width 1.5s cubic-bezier(0.1, 0.42, 0.41, 1);
}
/* ESTILO DO CARROSSEL */
.carousel-container {
    margin-top: 25px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    position: relative;
}

.projeto-display {
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: 0.3s;
}

.projeto-nome {
    font-weight: 700;
    color: var(--cor-destaque);
    margin-bottom: 5px;
}

.projeto-desc {
    font-size: 13px;
    line-height: 1.4;
    opacity: 0.8;
}

.carousel-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

.seta-btn {
    background: var(--cor-caixa);
    border: none;
    color: var(--cor-texto);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.seta-btn:hover {
    background: var(--cor-destaque);
    color: white;
}

.projeto-contador {
    font-size: 12px;
    font-weight: bold;
    opacity: 0.6;
}
/* Esconde a lista por padrão e prepara a animação */
#lista-skills {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease-out, opacity 0.5s;
    opacity: 0;
    margin-top: 0;
}

/* Classe que o JS vai colocar para mostrar */
#lista-skills.aberto {
    max-height: 500px; /* Um valor alto o suficiente para caber as barras */
    opacity: 1;
    margin-top: 20px;
}

.btn-skills {
    background: none;
    border: 1px solid var(--cor-destaque);
    color: var(--cor-destaque);
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    margin: 10px 0;
    transition: 0.3s;
}

.btn-skills:hover {
    background: var(--cor-destaque);
    color: white;
}
</style>

  <script> // 1. DADOS DAS SKILLS (Faltava isso!)
const skills = [
    { nome: "Photoshop", nivel: "90%" },
    { nome: "HTML/CSS", nivel: "75%" },
    { nome: "ADS (Lógica)", nivel: "60%" }
];

// 2. DADOS DOS PROJETOS
const meusProjetos = [
    { nome: "Portfólio Glassmorphism", desc: "Este card interativo usando efeitos de vidro e modo dark." },
    { nome: "Sistema de Cadastro", desc: "Estudo de lógica em ADS para manipulação de listas e objetos." },
    { nome: "Landing Page Designer", desc: "Projeto focado em UI/UX para agência de design." }
];

let indiceAtual = 0;

// 3. FUNÇÃO PARA CRIAR AS BARRINHAS (Faltava isso!)
function renderizarSkills() {
    const listaSkills = document.getElementById('lista-skills');
    if(!listaSkills) return; // Segurança de código
    
    listaSkills.innerHTML = ""; // Limpa para não duplicar
    skills.forEach(skill => {
        const item = document.createElement('div');
        item.className = 'skill-item';
        item.innerHTML = `
            <div class="skill-info">
                <span>${skill.nome}</span>
                <span>${skill.nivel}</span>
            </div>
            <div class="skill-bar-bg">
                <div class="skill-bar-fill" style="width: ${skill.nivel}"></div>
            </div>
        `;
        listaSkills.appendChild(item);
    });
}

// 4. LÓGICA DO CARROSSEL
function atualizarCarrossel() {
    const display = document.getElementById('projeto-atual');
    const contador = document.getElementById('contador-projeto');
    const proj = meusProjetos[indiceAtual];

    display.style.opacity = 0;
    setTimeout(() => {
        display.innerHTML = `
            <div class="projeto-nome">${proj.nome}</div>
            <div class="projeto-desc">${proj.desc}</div>
        `;
        display.style.opacity = 1;
        contador.innerText = `${indiceAtual + 1} / ${meusProjetos.length}`;
    }, 200);
}

function proximoProjeto() {
    indiceAtual = (indiceAtual + 1) % meusProjetos.length;
    atualizarCarrossel();
}

function projetoAnterior() {
    indiceAtual = (indiceAtual - 1 + meusProjetos.length) % meusProjetos.length;
    atualizarCarrossel();
}

// 5. BOTÃO DE ABRIR/FECHAR SKILLS
function toggleSkills() {
    const lista = document.getElementById('lista-skills');
    const btn = document.querySelector('.btn-skills');
    lista.classList.toggle('aberto');

    if (lista.classList.contains('aberto')) {
        btn.innerHTML = '<i class="fa-solid fa-chevron-up"></i> Fechar Habilidades';
    } else {
        btn.innerHTML = '<i class="fa-solid fa-gears"></i> Minhas Habilidades';
    }
}

// 6. INICIALIZAÇÃO E TEMA
window.onload = () => {
    renderizarSkills();
    atualizarCarrossel();
};

const temaSalvo = localStorage.getItem('tema');
if (temaSalvo === 'dark') { document.body.classList.add('dark-mode'); }

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('tema', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}

let tituloOriginal = document.title;
window.onblur = () => { document.title = "Volte para ver meu projeto! 😉"; };
window.onfocus = () => { document.title = tituloOriginal; }; </script>
